name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: scribecli
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: scribecli

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: "0"

      - name: Install CMake
        run: brew install cmake

      - name: Build bundled whisper-cli
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_bundled_whisper_cli.sh "${PWD}/dist/whisper-cli"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="scribecli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          package_dir="dist/scribecli-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${package_dir}/bin" "${package_dir}/libexec/scribecli"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${package_dir}/bin/"
          codesign --force --sign - "${package_dir}/bin/${{ matrix.binary_name }}" >/dev/null 2>&1 || true
          cp "dist/whisper-cli" "${package_dir}/libexec/scribecli/whisper-cli"
          cp README.md LICENSE "${package_dir}/"
          tar -C dist -czf "dist/$archive" "$(basename "$package_dir")"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scribecli-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_ARM=$(sha256sum "dist/scribecli-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_X86_MAC=$(sha256sum "dist/scribecli-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/donutdaniel/homebrew-tap.git"
          cd homebrew-tap

          cat > Formula/scribecli.rb << FORMULA
          class Scribecli < Formula
            desc "Local meeting recording and transcription CLI for macOS"
            homepage "https://github.com/donutdaniel/scribecli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/donutdaniel/scribecli/releases/download/${TAG}/scribecli-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "https://github.com/donutdaniel/scribecli/releases/download/${TAG}/scribecli-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            def install
              bin.install "bin/scribecli"
              (libexec/"scribecli").install "libexec/scribecli/whisper-cli"
            end

            test do
              assert_match "scribecli", shell_output("#{bin}/scribecli --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scribecli.rb
          git commit -m "Update scribecli to ${VERSION}"
          git push
